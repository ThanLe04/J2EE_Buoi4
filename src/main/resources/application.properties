spring.application.name=bai4_qlsp
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:static/

# 1. URL kết nối (Đảm bảo bạn đã tạo DB 'j2ee_buoi4' trong Workbench)
spring.datasource.url=jdbc:mysql://localhost:3306/j2ee_buoi4?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234

# 2. Cấu hình Hibernate (Tự động tạo bảng từ Class Java)
spring.jpa.hibernate.ddl-auto=update
# Hiển thị SQL ra Console để dễ theo dõi
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true