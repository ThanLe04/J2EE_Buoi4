<!DOCTYPE html>
<html lang="en" 
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng của bạn</title>
</head>
<body>
    <div layout:fragment="content" class="container body-content mt-4">
        <h2 class="mb-4">Giỏ hàng của bạn</h2>

        <div th:if="${#lists.isEmpty(CART_ITEMS)}" class="alert alert-info">
            Giỏ hàng của bạn đang trống. <a th:href="@{/products}" class="alert-link">Tiếp tục mua sắm</a>
        </div>

        <div th:unless="${#lists.isEmpty(CART_ITEMS)}">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Hình ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Đơn giá</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${CART_ITEMS}">
                        <td class="text-center">
                            <img th:if="${item.image != null}" th:src="@{'/images/' + ${item.image}}" width="80" alt="Product Image">
                        </td>
                        <td th:text="${item.name}"></td>
                        <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                        <td>
                            <form th:action="@{/cart/update}" method="post" class="d-flex align-items-center">
                                <input type="hidden" name="id" th:value="${item.productId}">
                                <input type="number" name="qty" th:value="${item.quantity}" min="1" class="form-control me-2" style="width: 80px;">
                                <button type="submit" class="btn btn-sm btn-primary">Cập nhật</button>
                            </form>
                        </td>
                        <td th:text="${#numbers.formatDecimal(item.amount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'" class="fw-bold"></td>
                        <td>
                            <a th:href="@{/cart/remove/{id}(id=${item.productId})}" 
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Xóa sản phẩm này khỏi giỏ hàng?')">Xóa</a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="d-flex justify-content-between align-items-center mt-4">
                <a th:href="@{/products}" class="btn btn-outline-secondary">Tiếp tục mua sắm</a>
                <div class="text-end">
                    <h4>Tổng tiền: <span class="text-danger" th:text="${#numbers.formatDecimal(TOTAL, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span></h4>
                    <a th:href="@{/cart/checkout}" class="btn btn-success btn-lg mt-2">Tiến hành thanh toán</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
