<!DOCTYPE html>
<html lang="en" 
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
</head>
<body>
    <div layout:fragment="content" class="container body-content">
        <h2 class="mt-4">Edit Product</h2>
        
        <form th:action="@{/products/edit}" th:object="${product}" 
              method="post" enctype="multipart/form-data">
            
            <input type="hidden" th:field="*{id}" />

            <div class="form-group mb-3">
                <label for="name">Name</label>
                <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name">
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-group mb-3">
                <label for="price">Price</label>
                <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price">
                <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="form-group mb-3">
                <label for="category">Category</label>
                <select class="form-control" id="category" th:field="*{category.id}"> <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${cat.id == product.category?.id}">
                    </option>
                </select>
            </div>

            <div class="form-group mb-3">
                <label for="image">Image</label>
                <div class="mb-2">
                    <img th:if="${product.image != null}" 
                         th:src="@{/images/} + ${product.image}" 
                         width="100" class="img-thumbnail"/>
                </div>
                <input class="form-control" type="file" id="image" name="imageProduct" accept="image/png, image/jpeg">
                <input type="hidden" th:field="*{image}">
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
