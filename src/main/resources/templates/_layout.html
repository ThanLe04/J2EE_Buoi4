<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
      rel="stylesheet" 
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
      crossorigin="anonymous">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            
            <div class="navbar-nav me-auto" style="padding-left: 20px">
                <a class="navbar-brand" th:href="@{/products}">Home</a>
                
                <a class="navbar-brand" sec:authorize="hasRole('ADMIN')" th:href="@{/products/create}">Products</a>
            </div>

            <div class="d-flex align-items-center gap-3" style="padding-right: 20px">

                <div sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-light" th:href="@{/login}">Login</a>
                </div>

                <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
                    <span class="text-light mb-0">
                        Xin chào, <strong sec:authentication="name" class="text-warning"></strong>!
                    </span>
                    
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-danger">Logout</button>
                    </form>
                </div>

            </div>
        </div>
    </nav>

    <div layout:fragment="content" class="container body-content mt-4">
    </div>

    <div class="card-footer text-center mt-5">
        <hr/>
        <p>&copy; 2026 - Phát triển ứng dụng với J2EE</p>
    </div>
</body>
</html>
